<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اللاعب</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h2 id="playerName"></h2>

    <div id="matchStatus" class="status-box"></div>

    <button class="btn green" onclick="vote('YES')">سأحضر ⚽</button>
    <button class="btn red" onclick="vote('NO')">أعتذر ❌</button>
    <button class="btn yellow" onclick="removeVote()">إلغاء التصويت ✏️</button>

    <button class="btn dark" onclick="logout()">تسجيل الخروج</button>

</div>

<script>

const playerName = localStorage.getItem("playerName");
document.getElementById("playerName").innerText = playerName;

async function vote(status){
    await fetch("/api/attendance/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            playerName:playerName,
            status:status
        })
    });
    loadStatus();
}

async function removeVote(){
    await fetch("/api/attendance/remove",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            playerName:playerName
        })
    });
    loadStatus();
}

async function loadStatus(){
    const res = await fetch("/api/attendance/active-list");
    const data = await res.json();

    const me = data.find(p => p.name === playerName);

    if(!me){
        document.getElementById("matchStatus").innerText = "🚫 لم يتم نشر المباراة بعد";
        return;
    }

    document.getElementById("matchStatus").innerText = me.status;
}

function logout(){
    localStorage.clear();
    window.location.href="login.html";
}

loadStatus();

</script>

</body>
</html>

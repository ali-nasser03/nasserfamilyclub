<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اللاعب</title>
</head>

<body>

<h2 id="playerHeader"></h2>

<div id="mInfo"></div>
<div id="myStatus"></div>

<button onclick="vote('YES')">سأحضر</button>
<button onclick="vote('NO')">أعتذر</button>
<button onclick="removeVote()">إلغاء التصويت</button>

<table border="1">
<thead>
<tr>
<th>اللاعب</th>
<th>الحالة</th>
</tr>
</thead>
<tbody id="pBody"></tbody>
</table>

<script>
const fullName = localStorage.getItem('fullName');

document.getElementById('playerHeader').innerText = fullName;

function isAdmin(p){ return p.role === "ADMIN"; }
function isExempt(p){ return p.working === false; }

async function update(){

    const mRes = await fetch('/api/matches/latest');
    let m = mRes.ok ? await mRes.json() : null;

    if(!m || !m.active){
        document.getElementById('mInfo').innerText = "لم يتم نشر مباراة";
    }else{
        document.getElementById('mInfo').innerText =
            m.location + " - " + m.dateTime.replace("T"," ");
    }

    const res = await fetch('/api/attendance/active-list');
    const data = (await res.json()).filter(p => !isAdmin(p));

    const me = data.find(p => p.name === fullName);

    // 🔥 فقط هو يشوف حالته
    if(me){
        if(isExempt(me)){
            document.getElementById('myStatus').innerText = "معفى";
        }else if(me.paid){
            document.getElementById('myStatus').innerText = "دافع";
        }else{
            document.getElementById('myStatus').innerText = "لم يدفع";
        }
    }

    // ❌ ما نعرض المعفيين
    const yes = data.filter(p => p.status?.includes('✅'));
    const no = data.filter(p => p.status?.includes('❌'));
    const wait = data.filter(p => !p.status);

    let html = "";

    yes.forEach(p=>{
        html += `<tr><td>${p.name}</td><td>حاضر</td></tr>`;
    });

    no.forEach(p=>{
        html += `<tr><td>${p.name}</td><td>معتذر</td></tr>`;
    });

    wait.forEach(p=>{
        html += `<tr><td>${p.name}</td><td>لم يصوت</td></tr>`;
    });

    document.getElementById('pBody').innerHTML = html;
}

async function vote(status){
    await fetch('/api/attendance/register',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({playerName:fullName,status})
    });
    update();
}

async function removeVote(){
    await fetch('/api/attendance/remove',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({playerName:fullName})
    });
    update();
}

update();
</script>

</body>
</html>

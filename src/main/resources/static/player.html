<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحة اللاعب</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#2c3e50;
    color:white;
}

.container {
    padding:15px;
}

.card {
    background:white;
    color:#333;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.yes {background:#27ae60; color:white;}
.no {background:#e74c3c; color:white;}
.clear {background:#f39c12; color:white;}

table {
    width:100%;
    border-collapse: collapse;
}

td, th {
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2 id="pName"></h2>

        <div id="mInfo"></div>

        <div id="myStatus" style="margin:10px 0; font-weight:bold;"></div>

        <button class="yes" onclick="vote('YES')">سأحضر</button>
        <button class="no" onclick="vote('NO')">لن أحضر</button>
        <button class="clear" onclick="removeVote()">إلغاء التصويت</button>
    </div>

    <div class="card">
        <h3>قائمة اللاعبين</h3>
        <table>
            <thead>
                <tr>
                    <th>الاسم</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="pBody"></tbody>
        </table>
    </div>

</div>

<!-- نفس التصميم تبعك بالكامل بدون تغيير -->

<script>
    document.getElementById('pName').innerText = "كابتن " + fullName;
    document.getElementById('playerHeader').innerText = "اللاعب: " + fullName;

    async function update() {
        try {
            const mRes = await fetch('/api/matches/latest');
            let m = mRes.ok ? await mRes.json() : null;

            if (!m || !m.active) {
                document.getElementById('mInfo').innerHTML =
                    "<span style='color:#c0392b'>🚫 لم يتم نشر المباراة بعد</span>";
            } else {
                document.getElementById('mInfo').innerHTML =
                    `📍 ${m.location}<br>⏰ ${String(m.dateTime).replace('T',' ')}`;
            }

            const res = await fetch('/api/attendance/active-list');
            const data = await res.json();

            // 🔥 فلترة الأدمن
            const filtered = data.filter(p => p.role !== "ADMIN");

            const me = filtered.find(p => p.name === fullName);

            // 🟡 حالة الدفع
            if (me) {
                if (me.status && me.status.includes("معفى")) {
                    document.getElementById('myStatus').innerHTML =
                        "<span style='color:orange'>🟡 حالة دفعك: معفى</span>";
                } else if (me.paid) {
                    document.getElementById('myStatus').innerHTML =
                        "<span style='color:green'>✅ حالة دفعك: دافع</span>";
                } else {
                    document.getElementById('myStatus').innerHTML =
                        "<span style='color:#c0392b'>⏳ حالة دفعك: لم تدفع</span>";
                }
            }

            const yes = filtered.filter(p => p.status.includes('✅'));
            const no = filtered.filter(p => p.status.includes('❌'));
            const wait = filtered.filter(p => !p.status.includes('✅') && !p.status.includes('❌'));

            let html = "";
            html += yes.map(p => `<tr><td>${p.name}</td><td style="color:green">سأحضر ✅</td></tr>`).join('');
            html += no.map(p => `<tr><td>${p.name}</td><td style="color:red">معتذر ❌</td></tr>`).join('');
            html += wait.map(p => `<tr><td>${p.name}</td><td style="color:gray">لم يصوت</td></tr>`).join('');

            document.getElementById('pBody').innerHTML = html;

            await loadHistory();

        } catch (e) {
            console.error(e);
        }
    }

    window.onload = update;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اللاعب</title>
</head>

<body>

<h2 id="playerHeader"></h2>

<div id="mInfo"></div>
<div id="myStatus"></div>

<button onclick="vote('YES')">سأحضر</button>
<button onclick="vote('NO')">أعتذر</button>
<button onclick="removeVote()">إلغاء التصويت</button>

<table border="1">
<thead>
<tr>
<th>اللاعب</th>
<th>الحالة</th>
</tr>
</thead>
<tbody id="pBody"></tbody>
</table>

<!-- 🔴 لا تعدل التصميم، فقط انسخ -->

<script>
function isAdmin(p){ return p.role === "ADMIN"; }
function isExempt(p){ return p.working === false; }

async function update() {

    const mRes = await fetch('/api/matches/latest');
    let m = mRes.ok ? await mRes.json() : null;

    if (!m || !m.active) {
        document.getElementById('mInfo').innerHTML =
            "<span style='color:#c0392b'>🚫 لم يتم نشر مباراة</span>";
    } else {
        document.getElementById('mInfo').innerHTML =
            `📍 ${m.location}<br>⏰ ${m.dateTime.replace("T"," ")}`;
    }

    const res = await fetch('/api/attendance/active-list');
    const data = (await res.json()).filter(p => !isAdmin(p));

    const me = data.find(p => p.name === fullName);

    // 🟡 فقط اللاعب نفسه يشوف معفى
    if(me){
        if(isExempt(me)){
            document.getElementById('myStatus').innerHTML =
                "<span style='color:orange'>🟡 معفى</span>";
        } else if(me.paid){
            document.getElementById('myStatus').innerHTML =
                "<span style='color:green'>✅ دافع</span>";
        } else {
            document.getElementById('myStatus').innerHTML =
                "<span style='color:red'>⏳ لم يدفع</span>";
        }
    }

    // ❌ إخفاء المعفيين من الجدول
    const filtered = data.filter(p => !isExempt(p));

    const yes = filtered.filter(p => p.status?.includes('YES'));
    const no = filtered.filter(p => p.status?.includes('NO'));
    const wait = filtered.filter(p => !p.status);

    let html = "";

    html += yes.map(p => `<tr><td>${p.name}</td><td style="color:green">سأحضر</td></tr>`).join('');
    html += no.map(p => `<tr><td>${p.name}</td><td style="color:red">معتذر</td></tr>`).join('');
    html += wait.map(p => `<tr><td>${p.name}</td><td style="color:gray">لم يصوت</td></tr>`).join('');

    document.getElementById('pBody').innerHTML = html;
}
</script>
</body>
</html>

<script>
async function updatePlayers() {
    try {
        const res = await fetch('/api/users/players');
        let data = await res.json();

        // 🔥 فلترة الأدمن
        data = data.filter(p => p.role !== "ADMIN");

        const tbody = document.getElementById("pBody");

        let html = "";
        data.forEach(p => {
            html += `
                <tr>
                    <td>${p.fullName}</td>
                    <td>${p.status || "—"}</td>
                </tr>
            `;
        });

        tbody.innerHTML = html;

    } catch (e) {
        console.error(e);
    }
}
</script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة اللاعب</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #223648, #2c3e50);
            color: white;
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-card,
        .table-container {
            width: 100%;
            max-width: 430px;
            border-radius: 22px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        .top-card {
            background: #ecf0f1;
            color: #2c3e50;
            padding: 24px 18px;
            margin-bottom: 18px;
            text-align: center;
        }

        .player-name {
            margin: 0 0 12px;
            font-size: 1.6rem;
        }

        .match-info {
            background: #dfe6e9;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.95rem;
            margin-bottom: 12px;
            line-height: 1.8;
        }

        .status-box {
            font-weight: bold;
            margin-bottom: 14px;
            min-height: 24px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin: 7px 0;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.25s;
            color: white;
        }

        .btn-yes {
            background: #1f9d55;
        }

        .btn-yes:hover {
            background: #188044;
        }

        .btn-no {
            background: #d64541;
        }

        .btn-no:hover {
            background: #b83835;
        }

        .btn-logout {
            background: #4b5d6b;
        }

        .btn-logout:hover {
            background: #3d4d59;
        }

        .table-container {
            background: white;
            color: #333;
            padding: 16px;
        }

        .table-title {
            text-align: center;
            color: #2c3e50;
            margin: 0 0 14px;
            font-size: 1.2rem;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 280px;
        }

        th, td {
            padding: 12px 8px;
            border-bottom: 1px solid #eee;
            text-align: center;
            font-size: 0.95rem;
        }

        th {
            background: #34495e;
            color: white;
        }

        .empty-note {
            color: #666;
            text-align: center;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .top-card,
            .table-container {
                border-radius: 18px;
            }

            .top-card {
                padding: 18px 14px;
            }

            .player-name {
                font-size: 1.35rem;
            }

            .match-info,
            th, td,
            .btn {
                font-size: 0.95rem;
            }

            .btn {
                padding: 13px;
            }
        }
    </style>
</head>
<body>

<script>
    const fullName = localStorage.getItem('fullName');
    if (!fullName) {
        window.location.href = 'login.html';
    }
</script>

<div class="top-card">
    <h2 id="pName" class="player-name">كابتن</h2>

    <div id="mInfo" class="match-info">جاري تحميل معلومات المباراة...</div>

    <div id="myStatus" class="status-box"></div>

    <button class="btn btn-yes" onclick="vote('YES')">⚽ سأحضر</button>
    <button class="btn btn-no" onclick="vote('NO')">❌ أعتذر</button>
    <button class="btn btn-logout" onclick="logout()">تسجيل الخروج</button>
</div>

<div class="table-container">
    <h3 class="table-title">📊 قائمة الحضور</h3>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>اللاعب</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="pBody"></tbody>
        </table>
    </div>
    <div id="emptyNote" class="empty-note" style="display:none;">لا يوجد بيانات حاليًا</div>
</div>

<script>
    document.getElementById('pName').innerText = "كابتن " + fullName;

    async function update() {
        try {
            const mRes = await fetch('/api/matches/latest');
            const m = await mRes.json();

            if (m) {
                document.getElementById('mInfo').innerHTML =
                    `📍 ${m.location}<br>⏰ ${String(m.dateTime).replace('T', ' ')}`;
            } else {
                document.getElementById('mInfo').innerHTML = "لا توجد مباراة منشورة حاليًا";
            }

            const res = await fetch('/api/attendance/active-list');
            const data = await res.json();

            const me = data.find(p => p.name === fullName);
            if (me) {
                document.getElementById('myStatus').innerHTML = me.paid
                    ? "<span style='color:green'>✅ حالة دفعك: دافع</span>"
                    : "<span style='color:#c0392b'>⏳ حالة دفعك: لم تدفع</span>";
            } else {
                document.getElementById('myStatus').innerHTML =
                    "<span style='color:#555'>لا يوجد سجل دفع لك حتى الآن</span>";
            }

            const yes = data.filter(p => p.status.includes('✅'));
            const no = data.filter(p => p.status.includes('❌'));
            const wait = data.filter(p => !p.status.includes('✅') && !p.status.includes('❌'));

            let html = "";
            html += yes.map(p => `<tr><td>${p.name}</td><td style="color:green; font-weight:bold;">سأحضر ✅</td></tr>`).join('');
            html += no.map(p => `<tr><td>${p.name}</td><td style="color:red; font-weight:bold;">معتذر ❌</td></tr>`).join('');
            html += wait.map(p => `<tr><td>${p.name}</td><td style="color:gray;">لم يصوت</td></tr>`).join('');

            document.getElementById('pBody').innerHTML = html;
            document.getElementById('emptyNote').style.display = data.length ? 'none' : 'block';

        } catch (e) {
            console.error(e);
            document.getElementById('mInfo').innerHTML = "حدث خطأ أثناء تحميل البيانات";
        }
    }

    async function vote(status) {
        try {
            await fetch('/api/attendance/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    playerName: fullName,
                    status: status
                })
            });
            update();
        } catch (e) {
            console.error(e);
            alert("حدث خطأ أثناء إرسال التصويت");
        }
    }

    function logout() {
        localStorage.removeItem('fullName');
        window.location.href = 'login.html';
    }

    window.onload = update;
</script>

</body>
</html>

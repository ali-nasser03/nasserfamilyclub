<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة اللاعب</title>
    <!-- ⚠️ لا تغيّر أي CSS -->
    <!-- نفس CSS تبعك 그대로 -->
</head>
<body>

<script>
const fullName = localStorage.getItem('fullName');
if (!fullName) window.location.href = 'login.html';
</script>

<div class="header" id="playerHeader">صفحة اللاعب</div>
<div class="swipe-hint">اسحب يمين أو يسار للتنقل بين الصفحات</div>

<div class="slider">

    <!-- الصفحة الأولى -->
    <section class="page">
        <div class="card">
            <h2 id="pName" class="player-name"></h2>

            <div id="mInfo" class="match-info"></div>
            <div id="myStatus" class="status-box"></div>

            <button class="btn btn-yes" id="yesBtn" onclick="vote('YES')">⚽ سأحضر</button>
            <button class="btn btn-no" id="noBtn" onclick="vote('NO')">❌ أعتذر</button>
            <button class="btn btn-clear" id="clearBtn" onclick="removeVote()">🧹 إلغاء التصويت</button>
            <button class="btn btn-logout" onclick="logout()">تسجيل الخروج</button>
        </div>
    </section>

    <!-- الصفحة الثانية -->
    <section class="page">
        <div class="table-container">
            <h3 class="table-title">📊 قائمة الحضور</h3>
            <table>
                <thead>
                <tr>
                    <th>اللاعب</th>
                    <th>الحالة</th>
                </tr>
                </thead>
                <tbody id="pBody"></tbody>
            </table>
        </div>
    </section>

</div>

<script>

document.getElementById('pName').innerText = "كابتن " + fullName;
document.getElementById('playerHeader').innerText = "اللاعب: " + fullName;

function isExempt(p){ return p.working === false; }

async function update(){

    const mRes = await fetch('/api/matches/latest');
    let m = mRes.ok ? await mRes.json() : null;

    if(!m || !m.active){
        document.getElementById('mInfo').innerHTML =
            "<span style='color:red'>🚫 لم يتم نشر المباراة</span>";
    } else {
        document.getElementById('mInfo').innerHTML =
            `📍 ${m.location}<br>⏰ ${m.dateTime.replace("T"," ")}`;
    }

    const res = await fetch('/api/attendance/active-list');
    const data = (await res.json()).filter(p => p.role !== "ADMIN");

    const me = data.find(p => p.name === fullName);

    if(me){
        if(isExempt(me)){
            document.getElementById('myStatus').innerHTML =
                "<span style='color:orange'>🟡 معفى</span>";
        } else if(me.paid){
            document.getElementById('myStatus').innerHTML =
                "<span style='color:green'>✅ دافع</span>";
        } else {
            document.getElementById('myStatus').innerHTML =
                "<span style='color:red'>⏳ لم يدفع</span>";
        }
    }

    // ❌ إخفاء المعفيين
    const filtered = data.filter(p => p.working !== false);

    let html = "";

    filtered.forEach(p=>{
        if(p.status === 'YES'){
            html += `<tr><td>${p.name}</td><td style="color:green">سأحضر</td></tr>`;
        } else if(p.status === 'NO'){
            html += `<tr><td>${p.name}</td><td style="color:red">معتذر</td></tr>`;
        } else {
            html += `<tr><td>${p.name}</td><td style="color:gray">لم يصوت</td></tr>`;
        }
    });

    document.getElementById('pBody').innerHTML = html;
}

async function vote(status){
    await fetch('/api/attendance/register',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({playerName:fullName,status})
    });
    update();
}

async function removeVote(){
    await fetch('/api/attendance/remove',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({playerName:fullName})
    });
    update();
}

function logout(){
    localStorage.removeItem('fullName');
    window.location.href = 'login.html';
}

update();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الفريق</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f2f4f7;
            background-image:
                linear-gradient(rgba(255,255,255,0.88), rgba(255,255,255,0.88)),
                url('logo.jpg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        .login-card {
            background-color: rgba(255,255,255,0.96);
            width: 100%;
            max-width: 430px;
            padding: 28px 20px;
            border-radius: 26px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.14);
            text-align: center;
            border: 1px solid #eee;
            position: relative;
        }

        .logo {
            width: 140px;
            max-width: 55%;
            height: auto;
            display: block;
            margin: 0 auto 16px auto;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 2rem;
            color: #111;
        }

        .hint {
            color: #333;
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 22px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border: 1px solid #d8d8d8;
            border-radius: 14px;
            font-size: 1.05rem;
            text-align: center;
            background: #fff;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn-login {
            background: #0f6a27;
        }

        .btn-login:hover {
            background: #0b541e;
        }

        .btn-register {
            background: #0b4d90;
        }

        .btn-register:hover {
            background: #083d72;
        }

        .btn-confirm {
            background: #007bff;
        }

        .btn-confirm:hover {
            background: #0069d9;
        }

        .btn-cancel {
            background: #6c757d;
        }

        .btn-cancel:hover {
            background: #5b636a;
        }

        .register-box {
            display: none;
            margin-top: 10px;
            padding-top: 18px;
            border-top: 1px solid #ddd;
        }

        .register-box.active {
            display: block;
        }

        .switch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            background: #f7f7f7;
            border: 1px solid #ddd;
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 14px;
            text-align: right;
        }

        .switch-label {
            font-size: 1rem;
            color: #222;
            font-weight: 600;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 56px;
            height: 30px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
            margin: 0;
            padding: 0;
        }

        .slider-switch {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 30px;
        }

        .slider-switch:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            right: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        .switch input:checked + .slider-switch {
            background-color: #27ae60;
        }

        .switch input:checked + .slider-switch:before {
            transform: translateX(-26px);
        }

        /* Popup admin */
        .popup-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .popup-overlay.active {
            display: flex;
        }

        .popup-box {
            width: 100%;
            max-width: 360px;
            background: white;
            color: #222;
            border-radius: 20px;
            padding: 22px 18px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .popup-box h3 {
            margin-top: 0;
            margin-bottom: 14px;
        }

        .popup-actions {
            display: flex;
            gap: 10px;
        }

        .popup-actions .btn {
            margin-bottom: 0;
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
                background-size: 85%;
            }

            .login-card {
                padding: 22px 16px;
                border-radius: 20px;
            }

            .logo {
                width: 105px;
                max-width: 48%;
            }

            h1 {
                font-size: 1.7rem;
            }

            .hint {
                font-size: 0.95rem;
            }

            input,
            .btn,
            .switch-label {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.jpg" alt="شعار الفريق" class="logo">

    <h1>دخول الفريق</h1>

    <div class="hint">
        الدخول يكون بالاسم الكامل، والتسجيل أول مرة من خلال نموذج التسجيل
    </div>

    <div id="loginSection">
        <input type="text" id="username" placeholder="أدخل اسمك الكامل">
        <button class="btn btn-login" onclick="login()">دخول</button>
        <button class="btn btn-register" onclick="showRegisterForm()">تسجيل لاعب جديد</button>
    </div>

    <div id="registerSection" class="register-box">
        <input type="text" id="registerName" placeholder="أدخل الاسم الثلاثي">
        <input type="number" id="registerAge" placeholder="أدخل العمر" min="1">

        <div class="switch-row">
<span class="switch-label" id="jobStatusText">بتشتغل؟ لا</span>
            <label class="switch">
                <input type="checkbox" id="registerWorking" onchange="updateWorkingLabel()">
                <span class="slider-switch"></span>
            </label>
        </div>

        <button class="btn btn-confirm" onclick="registerPlayer()">تأكيد التسجيل</button>
        <button class="btn btn-cancel" onclick="hideRegisterForm()">إلغاء</button>
    </div>
</div>

<!-- Admin Password Popup -->
<div class="popup-overlay" id="adminPopup">
    <div class="popup-box">
        <h3>دخول الأدمن</h3>
        <input type="password" id="adminPassword" placeholder="أدخل كلمة السر">
        <div class="popup-actions">
            <button class="btn btn-confirm" onclick="checkAdminPassword()">دخول</button>
            <button class="btn btn-cancel" onclick="closeAdminPopup()">إلغاء</button>
        </div>
    </div>
</div>

<script>
    let pendingAdminName = "";

    function normalizeName(name) {
        return name.trim().replace(/\s+/g, ' ');
    }

    function showRegisterForm() {
        document.getElementById('registerSection').classList.add('active');
    }

    function hideRegisterForm() {
        document.getElementById('registerSection').classList.remove('active');
        document.getElementById('registerName').value = "";
        document.getElementById('registerAge').value = "";
        document.getElementById('registerWorking').checked = false;
        updateWorkingLabel();
    }

    function updateWorkingLabel() {
        const isWorking = document.getElementById('registerWorking').checked;
document.getElementById('jobStatusText').innerText = isWorking ? "بتشتغل؟ نعم" : "بتشتغل؟ لا";
    }

    function openAdminPopup(name) {
        pendingAdminName = name;
        document.getElementById('adminPopup').classList.add('active');
        document.getElementById('adminPassword').value = "";
    }

    function closeAdminPopup() {
        document.getElementById('adminPopup').classList.remove('active');
        document.getElementById('adminPassword').value = "";
        pendingAdminName = "";
    }

    async function login() {
        const rawName = document.getElementById('username').value;
        const name = normalizeName(rawName);

        if (!name) {
            alert("يرجى إدخال الاسم");
            return;
        }

        if (name === "Admin" || name === "محمود ناصر") {
            openAdminPopup(name);
            return;
        }

        try {
            const res = await fetch(`/api/users/check?name=${encodeURIComponent(name)}`);
            const result = await res.text();

            if (result !== "FOUND") {
                alert("الاسم غير مسجل. اضغط على تسجيل لاعب جديد أولًا.");
                return;
            }

            localStorage.setItem('fullName', name);
            window.location.href = 'player.html';
        } catch (e) {
            alert("حدث خطأ أثناء تسجيل الدخول");
            console.error(e);
        }
    }

    async function checkAdminPassword() {
        const password = document.getElementById('adminPassword').value;

        if (!password) {
            alert("أدخل كلمة السر");
            return;
        }

        try {
            const res = await fetch('/api/users/admin-login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    fullName: pendingAdminName,
                    password: password
                })
            });

            const result = await res.text();

            if (result !== "SUCCESS") {
                alert("كلمة السر غير صحيحة");
                return;
            }

            localStorage.setItem('fullName', pendingAdminName);
            closeAdminPopup();
            window.location.href = 'admin.html';
        } catch (e) {
            alert("حدث خطأ أثناء دخول الأدمن");
            console.error(e);
        }
    }

    async function registerPlayer() {
        const rawName = document.getElementById('registerName').value;
        const name = normalizeName(rawName);
        const ageValue = document.getElementById('registerAge').value;
        const isWorking = document.getElementById('registerWorking').checked;

        if (!name) {
            alert("يرجى إدخال الاسم الثلاثي");
            return;
        }

        if (!ageValue) {
            alert("يرجى إدخال العمر");
            return;
        }

        const age = parseInt(ageValue, 10);

        if (isNaN(age) || age <= 0) {
            alert("يرجى إدخال عمر صحيح");
            return;
        }

        try {
            const res = await fetch('/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    fullName: name,
                    age: age,
                    working: isWorking
                })
            });

            const text = await res.text();

            if (!res.ok) {
                alert(text);
                return;
            }

            alert("تم تسجيل اللاعب بنجاح");
            hideRegisterForm();
            document.getElementById('username').value = name;
        } catch (e) {
            alert("حدث خطأ أثناء التسجيل");
            console.error(e);
        }
    }

    updateWorkingLabel();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>

<body>

<h2>لوحة التحكم</h2>

<div id="payList"></div>

<h3>إدارة اللاعبين</h3>
<div id="playersManageList"></div>

<script>

function isAdmin(p){ return p.role === "ADMIN"; }

async function load(){

    const res = await fetch('/api/attendance/active-list');
    const filtered = (await res.json()).filter(p => !isAdmin(p));

    // 🔥 تقسيم
    const normal = filtered.filter(p => p.working !== false);
    const exempt = filtered.filter(p => p.working === false);

    let html = "";

    // لاعبين عاديين
    normal.forEach(p=>{
        html += `
        <div>
            ${p.name}
            <input type="checkbox" ${p.paid ? 'checked' : ''}
            onchange="toggle(${p.id})">
        </div>
        `;
    });

    // 🟡 المعفيين آخر القائمة
    if(exempt.length){
        html += `<h4>المعفيين</h4>`;
        exempt.forEach(p=>{
            html += `<div>${p.name} - معفى</div>`;
        });
    }

    document.getElementById('payList').innerHTML = html;

    loadPlayers();
}

async function toggle(id){
    await fetch('/api/attendance/toggle-payment/'+id,{method:'POST'});
    load();
}

async function loadPlayers(){

    const res = await fetch('/api/users/players');
    const players = await res.json();

    let html = "";

    players.forEach(p=>{
        html += `
        <div style="margin-bottom:15px;">
            <input id="name-${p.id}" value="${p.fullName}">
            <input id="age-${p.id}" type="number" value="${p.age}">
            
            <label>
                يعمل؟
                <input id="working-${p.id}" type="checkbox" ${p.working ? 'checked':''}>
            </label>

            <button onclick="savePlayer(${p.id})">حفظ</button>
        </div>
        `;
    });

    document.getElementById('playersManageList').innerHTML = html;
}

async function savePlayer(id){

    const fullName = document.getElementById(`name-${id}`).value;
    const age = document.getElementById(`age-${id}`).value;
    const working = document.getElementById(`working-${id}`).checked;

    await fetch('/api/users/update/'+id,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({fullName,age,working})
    });

    alert("تم التعديل");
    load();
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>

<body>

<h2>لوحة التحكم</h2>

<div id="payList"></div>

<h3>إدارة اللاعبين</h3>
<div id="playersManageList"></div>

<script>
function isAdmin(p){ return p.role === "ADMIN"; }
function isExempt(p){ return p.working === false; }

async function load() {

    const res = await fetch('/api/attendance/active-list');
    const data = (await res.json()).filter(p => !isAdmin(p));

    // 🔥 الدفع
    const normal = data.filter(p => !isExempt(p));
    const exempt = data.filter(p => isExempt(p));

    let payHtml = "";

    // العاديين
    payHtml += normal.map(p => `
        <div class="row">
            <span>${p.name}</span>
            <input type="checkbox" ${p.paid ? 'checked':''} onchange="toggle(${p.id})">
        </div>
    `).join('');

    // 🟡 المعفيين بالآخر
    if(exempt.length){
        payHtml += `
        <div class="section-header">🟡 معفيين</div>
        `;

        payHtml += exempt.map(p => `
            <div class="row">
                <span>${p.name}</span>
                <span style="color:orange">معفى</span>
            </div>
        `).join('');
    }

    document.getElementById('payList').innerHTML = payHtml;

    loadPlayersManagement();
}

// 🔥 تعديل اللاعبين
async function loadPlayersManagement() {

    const res = await fetch('/api/users/players');
    const players = await res.json();

    document.getElementById('playersManageList').innerHTML =
        players.map(p => `
        <div class="row" style="flex-direction:column">
            <input id="name-${p.id}" value="${p.fullName}">
            <input id="age-${p.id}" type="number" value="${p.age}">
            
            <label>
                يعمل؟
                <input id="working-${p.id}" type="checkbox" ${p.working ? 'checked':''}>
            </label>

            <button onclick="savePlayer(${p.id})">حفظ</button>
        </div>
        `).join('');
}

async function savePlayer(id){

    const fullName = document.getElementById(`name-${id}`).value;
    const age = document.getElementById(`age-${id}`).value;
    const working = document.getElementById(`working-${id}`).checked;

    await fetch('/api/users/update/'+id,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({fullName,age,working})
    });

    alert("تم التعديل");
    load();
}

async function toggle(id){
    await fetch('/api/attendance/toggle-payment/'+id,{method:'POST'});
    load();
}

window.onload = load;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الأدمن</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h2>📊 قائمة الحضور</h2>

    <table>
        <thead>
            <tr>
                <th>اللاعب</th>
                <th>الحالة</th>
                <th>الدفع</th>
            </tr>
        </thead>
        <tbody id="attendanceTable"></tbody>
    </table>

    <button class="btn dark" onclick="logout()">تسجيل الخروج</button>

</div>

<script>

async function loadAttendance(){
    const res = await fetch("/api/attendance/active-list");
    const data = await res.json();

    const table = document.getElementById("attendanceTable");
    table.innerHTML = "";

    data.forEach(player => {

        const tr = document.createElement("tr");

        const nameTd = document.createElement("td");
        nameTd.innerText = player.name;

        const statusTd = document.createElement("td");
        statusTd.innerText = player.status;

        const payTd = document.createElement("td");
        payTd.innerText = player.paid ? "✔️" : "❌";

        tr.appendChild(nameTd);
        tr.appendChild(statusTd);
        tr.appendChild(payTd);

        table.appendChild(tr);
    });
}

function logout(){
    localStorage.clear();
    window.location.href="login.html";
}

loadAttendance();

</script>

</body>
</html>

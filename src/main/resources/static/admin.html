<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحة الأدمن</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: sans-serif;
    background: #2c3e50;
    color: white;
    overflow: hidden;
}

/* العنوان */
.header {
    text-align: center;
    padding: 12px;
    background: #1a252f;
    font-size: 18px;
    font-weight: bold;
}

/* شريط التنقل مثل الستوري */
.nav {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
    background: #22313f;
}

.nav button {
    flex: 0 0 auto;
    padding: 8px 14px;
    border-radius: 20px;
    border: none;
    background: #34495e;
    color: white;
    cursor: pointer;
    font-size: 14px;
}

.nav button.active {
    background: #27ae60;
}

/* السلايدر */
.slider {
    display: flex;
    height: calc(100vh - 100px);
    overflow-x: auto;
    scroll-snap-type: x mandatory;
}

/* كل صفحة */
.page {
    min-width: 100%;
    padding: 20px;
    scroll-snap-align: start;
    overflow-y: auto;
}

/* كروت */
.card {
    background: white;
    color: #333;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
}

/* أزرار */
button.main-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    background: #27ae60;
    color: white;
}

/* جدول */
table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    padding: 8px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

</style>
</head>

<body>

<div class="header">لوحة تحكم الأدمن</div>

<div class="nav">
    <button onclick="goTo(0)" class="active">المباراة</button>
    <button onclick="goTo(1)">الحضور</button>
    <button onclick="goTo(2)">الدفع</button>
    <button onclick="goTo(3)">السجل</button>
</div>

<div class="slider" id="slider">

    <!-- الصفحة 1 -->
    <div class="page">
        <div class="card">
            <h3>إضافة مباراة</h3>
            <input type="text" id="location" placeholder="المكان" style="width:100%; padding:10px;">
            <input type="datetime-local" id="dateTime" style="width:100%; padding:10px; margin-top:10px;">
            <button class="main-btn" onclick="addMatch()">نشر المباراة</button>
        </div>
    </div>

    <!-- الصفحة 2 -->
    <div class="page">
        <div class="card">
            <h3>قائمة الحضور</h3>
            <table>
                <tbody id="attendanceList"></tbody>
            </table>
        </div>
    </div>

    <!-- الصفحة 3 -->
    <div class="page">
        <div class="card">
            <h3>إدارة الدفع</h3>
            <table>
                <tbody id="paymentList"></tbody>
            </table>
        </div>
    </div>

    <!-- الصفحة 4 -->
    <div class="page">
        <div class="card">
            <h3>سجل المباريات</h3>
            <div id="history"></div>
        </div>
    </div>

</div>

<script>

const slider = document.getElementById("slider");
const navButtons = document.querySelectorAll(".nav button");

/* التنقل */
function goTo(index) {
    slider.scrollTo({
        left: index * window.innerWidth,
        behavior: "smooth"
    });

    navButtons.forEach(b => b.classList.remove("active"));
    navButtons[index].classList.add("active");
}

/* تغيير active عند السحب */
slider.addEventListener("scroll", () => {
    const index = Math.round(slider.scrollLeft / window.innerWidth);
    navButtons.forEach(b => b.classList.remove("active"));
    if (navButtons[index]) navButtons[index].classList.add("active");
});

/* API */

async function addMatch() {
    const location = document.getElementById("location").value;
    const dateTime = document.getElementById("dateTime").value;

    await fetch("/api/matches/add", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({location, dateTime})
    });

    alert("تم نشر المباراة");
}

async function loadAttendance() {
    const res = await fetch("/api/attendance/active-list");
    const data = await res.json();

    let html = "";
    data.forEach(p => {
        html += `<tr>
            <td>${p.name}</td>
            <td>${p.status}</td>
        </tr>`;
    });

    document.getElementById("attendanceList").innerHTML = html;
}

async function loadPayments() {
    const res = await fetch("/api/attendance/active-list");
    const data = await res.json();

    let html = "";
    data.forEach(p => {
        html += `<tr>
            <td>${p.name}</td>
            <td>${p.paid ? "✅" : "❌"}</td>
            <td><button onclick="toggle(${p.id})">تغيير</button></td>
        </tr>`;
    });

    document.getElementById("paymentList").innerHTML = html;
}

async function toggle(id) {
    await fetch(`/api/attendance/toggle-payment/${id}`, {method:"POST"});
    loadPayments();
}

async function loadHistory() {
    const res = await fetch("/api/attendance/history");
    const data = await res.json();

    let html = "";
    for (let match in data) {
        html += `<p><b>${match}</b><br>${data[match].join(", ")}</p>`;
    }

    document.getElementById("history").innerHTML = html;
}

/* تحميل البيانات */
window.onload = () => {
    loadAttendance();
    loadPayments();
    loadHistory();
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>

<body>

<h2>لوحة التحكم</h2>

<div id="payList"></div>

<script>

async function load(){

    const res = await fetch('/api/attendance/active-list');
    const data = (await res.json()).filter(p => p.role !== "ADMIN");

    const paid = data.filter(p => p.paid && p.working !== false);
    const unpaid = data.filter(p => !p.paid && p.working !== false);
    const exempt = data.filter(p => p.working === false);

    let html = "";

    html += "<h3>دافع</h3>";
    html += paid.map(p => `<div>${p.name}</div>`).join('');

    html += "<h3>لم يدفع</h3>";
    html += unpaid.map(p => `
        <div>
            ${p.name}
            <input type="checkbox" onchange="toggle(${p.id})">
        </div>
    `).join('');

    html += "<h3>معفي</h3>";
    html += exempt.map(p => `<div>${p.name}</div>`).join('');

    document.getElementById('payList').innerHTML = html;
}

async function toggle(id){
    await fetch('/api/attendance/toggle-payment/'+id,{method:'POST'});
    load();
}

load();
</script>

</body>
</html>

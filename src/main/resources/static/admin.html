<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غرفة العمليات</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Segoe UI',Tahoma;
background:#2c3e50;
color:white;
overflow:hidden;
}

.header{
text-align:center;
padding:14px;
background:#1f2d3a;
font-size:20px;
font-weight:bold;
}

.slider{
display:flex;
width:100%;
height:calc(100vh - 60px);
overflow-x:auto;
scroll-snap-type:x mandatory;
}

.page{
flex:0 0 100%;
padding:16px;
}

.card{
background:white;
color:#2c3e50;
border-radius:18px;
padding:18px;
max-width:700px;
margin:auto;
}

input,button{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:12px;
border:1px solid #ddd;
}

.main-btn{background:#27ae60;color:white;border:none;}
.warning-btn{background:#e67e22;color:white;border:none;}
.delete-btn{background:#c0392b;color:white;border:none;}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

.section-header{
background:#eef3f7;
padding:10px;
margin-top:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
}

.empty{text-align:center;color:#777;}
</style>
</head>

<body>

<div class="header">غرفة العمليات</div>

<div class="slider">

<!-- مباراة -->
<section class="page">
<div class="card">
<h2>🗓️ مباراة جديدة</h2>

<input id="loc" placeholder="المكان">
<input id="dt" type="datetime-local">

<button class="main-btn" onclick="createMatch()">نشر المباراة</button>

</div>
</section>

<!-- التصويت -->
<section class="page">
<div class="card">
<h2>🗳️ التصويت</h2>
<div id="voteList"></div>
</div>
</section>

<!-- الدفع -->
<section class="page">
<div class="card">
<h2>💰 الدفع</h2>

<div id="payStats"></div>
<div id="payList"></div>

<button class="warning-btn" onclick="resetMonth()">تصفير الدفع</button>

</div>
</section>

<!-- تعديل -->
<section class="page">
<div class="card">
<h2>👥 تعديل اللاعبين</h2>
<div id="playersEditor"></div>
</div>
</section>

</div>

<script>

function sortByName(arr){
return arr.sort((a,b)=>a.name.localeCompare(b.name,'ar'));
}

async function load(){
const res = await fetch('/api/attendance/active-list');
const data = await res.json();

const yes = sortByName(data.filter(p=>p.status.includes('✅')));
const no = sortByName(data.filter(p=>p.status.includes('❌')));
const wait = sortByName(data.filter(p=>!p.status.includes('✅')&&!p.status.includes('❌')));

let html='';

if(yes.length){
html+=`<div class="section-header">⚽ حاضرون (${yes.length})</div>`;
html+=yes.map(p=>`<div class="row"><span>${p.name}</span><span>✅</span></div>`).join('');
}

if(no.length){
html+=`<div class="section-header">❌ معتذرون (${no.length})</div>`;
html+=no.map(p=>`<div class="row"><span>${p.name}</span><span>❌</span></div>`).join('');
}

if(wait.length){
html+=`<div class="section-header">⏳ لم يصوتوا (${wait.length})</div>`;
html+=wait.map(p=>`<div class="row"><span>${p.name}</span><span>⏳</span></div>`).join('');
}

document.getElementById('voteList').innerHTML = html || '<div class="empty">لا يوجد</div>';

const paid = data.filter(p=>p.paid===true).length;
const unpaid = data.filter(p=>p.paid===false).length;
const exempt = data.filter(p=>p.paid==="معفي").length;

document.getElementById('payStats').innerHTML = `
<div class="section-header">دافع: ${paid} | غير دافع: ${unpaid}</div>
<div class="section-header">معفي: ${exempt} | الكل: ${data.length}</div>
`;

document.getElementById('payList').innerHTML = data.map(p=>{
if(p.paid==="معفي"){
return `<div class="row"><span>${p.name}</span><span>معفي</span></div>`;
}
return `<div class="row">
<span>${p.name}</span>
<input type="checkbox" ${p.paid?'checked':''} onchange="toggle(${p.id})">
</div>`;
}).join('');

loadPlayers();
}

async function loadPlayers(){
const res = await fetch('/api/users/players');
const players = await res.json();

document.getElementById('playersEditor').innerHTML = players.map(p=>`
<div class="row" style="display:block;">
<input value="${p.fullName}" id="n${p.id}">
<input value="${p.age}" id="a${p.id}" type="number">
<label><input type="checkbox" id="w${p.id}" ${p.working?'checked':''}> بشتغل</label>
<button class="main-btn" onclick="update(${p.id})">حفظ</button>
<button class="delete-btn" onclick="deletePlayer(${p.id})">حذف</button>
</div>
`).join('');
}

async function update(id){
await fetch(`/api/users/update/${id}`,{
method:'PUT',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
fullName:document.getElementById('n'+id).value,
age:parseInt(document.getElementById('a'+id).value),
working:document.getElementById('w'+id).checked
})
});
load();
}

async function deletePlayer(id){
if(!confirm("حذف اللاعب؟")) return;
await fetch(`/api/users/delete/${id}`,{method:'DELETE'});
load();
}

async function createMatch(){
const note = prompt("اكتب ملاحظة (اختياري):") || "";

await fetch('/api/matches/add',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
location:document.getElementById('loc').value,
dateTime:document.getElementById('dt').value,
note:note,
active:true
})
});

load();
}

async function toggle(id){
await fetch(`/api/attendance/toggle-payment/${id}`,{method:'POST'});
load();
}

async function resetMonth(){
if(!confirm("تصفير الدفع؟")) return;
await fetch('/api/attendance/reset-month',{method:'POST'});
load();
}

load();

</script>

</body>
</html>
